{% extends "base.html" %}
{% block title %}Login — Khoj Kam{% endblock %}
{% block content %}
<div class="container auth">
    <div class="auth-card">
        <h2>Login</h2>
        {% for m in messages %}<p class="form-msg">{{ m }}</p>{% endfor %}
        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="field">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="auth-alt">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
