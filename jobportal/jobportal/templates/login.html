<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family:-apple-system,sans-serif; background:#f4f5f7; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
        .box { background:#fff; padding:32px; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.1); width:320px; }
        h2 { margin:0 0 20px; text-align:center; }
        input { width:100%; padding:10px; margin-bottom:14px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; }
        button { width:100%; padding:10px; background:#1a73e8; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:15px; }
        .msg { color:#d33; font-size:13px; margin-bottom:10px; }
        .link { text-align:center; font-size:13px; margin-top:14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>
        {% for m in messages %}<p class="msg">{{ m }}</p>{% endfor %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="link">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</body>
</html>
