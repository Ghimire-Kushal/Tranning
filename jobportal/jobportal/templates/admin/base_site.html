{% extends "admin/base.html" %}

{% block title %}{{ title }} — Kam Da Admin{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Kam Da Admin</a></h1>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #1f6f5c;
        --primary-fg: #fff;
        --secondary: #185848;
        --accent: #b47d1e;
        --link-fg: #1f6f5c;
        --link-hover-color: #185848;
        --link-selected-fg: #b47d1e;
        --header-color: #f4f1ea;
        --header-branding-color: #f4f1ea;
        --header-bg: #1c1b19;
        --breadcrumbs-fg: #e5ddd0;
        --breadcrumbs-link-fg: #f4f1ea;
        --breadcrumbs-bg: #1f6f5c;
        --body-fg: #1c1b19;
        --body-bg: #f4f1ea;
        --body-quiet-color: #6f6a61;
        --body-loud-color: #1c1b19;
        --button-bg: #1f6f5c;
        --button-fg: #fff;
        --button-hover-bg: #185848;
        --default-button-bg: #1f6f5c;
        --default-button-hover-bg: #185848;
        --close-button-bg: #6f6a61;
        --close-button-hover-bg: #1c1b19;
        --delete-button-bg: #b23b3b;
        --delete-button-hover-bg: #8f2e2e;
        --object-tools-bg: #b47d1e;
        --object-tools-hover-bg: #96690f;
        --font-family-primary: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --border-color: #e5ddd0;
        --hairline-color: #e5ddd0;
        --darkened-bg: #ece7db;
        --selected-bg: #f6efe0;
        --selected-row: #f6efe0;
    }

    body {
        font-family: var(--font-family-primary);
    }

    #header {
        box-shadow: 0 1px 2px rgba(28,27,25,.08);
    }

    #branding h1, #branding h1 a:link, #branding h1 a:visited {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
        letter-spacing: -.01em;
        color: var(--header-color);
    }

    div.breadcrumbs {
        font-size: 13px;
    }

    .module h2, .module caption, .inline-group h2 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
        letter-spacing: -.01em;
        background: var(--primary);
    }

    #content-main .module {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(28,27,25,.04), 0 4px 16px rgba(28,27,25,.05);
        border: 1px solid var(--border-color);
        margin-bottom: 24px;
    }

    .dashboard .module table th {
        width: auto;
    }

    .dashboard #content-main {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        align-items: flex-start;
    }

    .dashboard #content-main > div {
        flex: 1 1 320px;
        min-width: 280px;
    }

    .dashboard .module table td, .dashboard .module table th {
        padding: 10px 12px;
    }

    .dashboard .module table tr:hover {
        background: var(--darkened-bg);
    }

    a:link, a:visited {
        color: var(--link-fg);
    }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        border-radius: 8px;
        text-transform: none;
        font-weight: 600;
    }

    .object-tools a {
        border-radius: 8px;
        font-weight: 600;
    }

    #changelist-filter {
        border-radius: 10px;
        border: 1px solid var(--border-color);
    }

    #changelist-filter h2 {
        font-family: "Fraunces", Georgia, serif;
        border-radius: 10px 10px 0 0;
    }
</style>
{% endblock %}
