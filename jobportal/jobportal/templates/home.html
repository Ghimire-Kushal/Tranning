<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal</title>
    <style>
        body { font-family:-apple-system,sans-serif; background:#f4f5f7; margin:0; color:#1a1a1a; }
        nav {
            display:flex; justify-content:flex-end; align-items:center; gap:16px;
            padding:14px 24px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.1);
        }
        nav a { text-decoration:none; color:#1a73e8; font-size:14px; }
        nav a.logout { color:#d33; }
        nav .user { color:#555; font-size:14px; }
        .hero { text-align:center; padding:100px 20px 60px; }
        .hero h1 { font-size:44px; margin:0 0 12px; }
        .hero p { color:#555; font-size:18px; margin:0 0 32px; }
        .btn {
            display:inline-block; background:#1a73e8; color:#fff; text-decoration:none;
            padding:12px 28px; border-radius:8px; font-size:16px;
        }
    </style>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <span class="user">Hi, {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="logout">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <div class="hero">
        <h1>Find Your Next Job</h1>
        <p>Browse the latest openings across Nepal.</p>
        <a href="{% url 'jobs' %}" class="btn">View Available Jobs →</a>
    </div>
</body>
</html>
